name: Daily Content Pipeline v2

on:
  schedule:
    # 5:30 AM IST (midnight UTC) — generate, render, upload to Drive
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip Drive upload'
        default: 'false'
        type: choice
        options: ['true', 'false']
      override_date:
        description: 'Override date (YYYY-MM-DD) for replay'
        default: ''

env:
  PYTHONUNBUFFERED: "1"
  DB_PATH: ${{ github.workspace }}/state.db

jobs:
  # ── Generate content + upload to Google Drive ─────────────────────
  generate-and-upload:
    name: Generate content + upload to Drive
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: System deps (Manim + FFmpeg + espeak)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libcairo2-dev libpango1.0-dev \
            libpangocairo-1.0-0 pkg-config python3-dev espeak-ng \
            texlive-latex-base texlive-fonts-recommended dvipng cm-super

      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install \
            manim>=0.18.0 manim-dsa \
            google-genai anthropic \
            google-api-python-client google-auth \
            kokoro>=0.9.2 soundfile numpy \
            Pillow requests python-telegram-bot

      - name: Build question bank
        run: cd src && python question_bank.py
        env:
          DB_PATH: ${{ env.DB_PATH }}

      - name: Generate content + upload to Drive
        run: cd src && python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FALLBACK_MODEL: ${{ secrets.FALLBACK_MODEL || 'llama-3.3-70b-versatile' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date || '' }}
          KOKORO_VOICE: am_adam
          DB_PATH: ${{ env.DB_PATH }}

      - name: Upload generated content as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: content-${{ github.run_id }}
          path: |
            output/
            state.db
          retention-days: 7

      - name: Commit state.db
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "dsa-bot"
          git config user.email "dsa-bot@users.noreply.github.com"
          git add state.db
          git diff --cached --quiet || (git commit -m "chore: daily state update [skip ci]" && git push)
