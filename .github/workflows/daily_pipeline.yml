name: Daily Content Pipeline v2

on:
  schedule:
    # Step A: 5:30 AM IST (midnight UTC) — generate scripts, render videos, carousel, copy
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — no actual posting'
        default: 'false'
        type: choice
        options: ['true', 'false']
      override_date:
        description: 'Override date (YYYY-MM-DD) for replay'
        default: ''
      slot_only:
        description: 'Run specific slot only (skip generation)'
        default: ''
        type: choice
        options: ['', 'morning', 'linkedin', 'noon', 'afternoon', 'evening']

env:
  PYTHONUNBUFFERED: "1"
  DB_PATH: ${{ github.workspace }}/state.db

jobs:
  # ── Job 1: Generate + Preview (6 AM IST = 12:30 AM UTC) ──────────────────
  generate-and-preview:
    name: Generate content + Telegram preview
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event.inputs.slot_only == '' || github.event.inputs.slot_only == ''
    outputs:
      content_ready: ${{ steps.generate.outputs.content_ready }}
      cal_date: ${{ steps.generate.outputs.cal_date }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: System deps (Manim + FFmpeg + espeak)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libcairo2-dev libpango1.0-dev \
            libpangocairo-1.0-0 pkg-config python3-dev espeak-ng \
            texlive-latex-base texlive-fonts-recommended dvipng cm-super

      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install \
            manim>=0.18.0 manim-dsa \
            google-generativeai anthropic \
            kokoro>=0.9.2 soundfile numpy \
            Pillow requests python-telegram-bot

      - name: Build question bank
        run: cd src && python question_bank.py
        env:
          DB_PATH: ${{ env.DB_PATH }}

      - name: Init DB + plan calendar
        run: |
          cd src
          python -c "
          import db, sys
          db.init_db()
          stats = db.count_questions()
          print(f'Bank: {stats}')
          if stats[\"remaining\"] < 20:
              print('WARNING: Bank low!')
          "

      - name: Generate all content (scripts + carousel + copy)
        id: generate
        run: |
          cd src
          python main.py
          echo "content_ready=true" >> $GITHUB_OUTPUT
          echo "cal_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date || '' }}
          KOKORO_VOICE: am_adam
          DB_PATH: ${{ env.DB_PATH }}

      - name: Upload generated content
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: content-${{ steps.generate.outputs.cal_date || 'unknown' }}
          path: |
            output/
            state.db
          retention-days: 7

      - name: Commit state.db
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "dsa-bot"
          git config user.email "dsa-bot@users.noreply.github.com"
          git add state.db
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]" && git push

  # ── Job 2: Post morning slot (7 AM IST = 1:30 AM UTC) ────────────────────
  post-morning:
    name: Post morning slot (YT long + Short 1 hook)
    runs-on: ubuntu-latest
    needs: generate-and-preview
    timeout-minutes: 20
    if: needs.generate-and-preview.outputs.content_ready == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date }}
          path: ./

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - run: pip install --quiet requests python-telegram-bot

      - name: Post morning slot
        run: cd src && python posters/staggered_poster.py
        env:
          PLATFORM_SLOT: morning
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: state.db
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  # ── Job 3: LinkedIn carousel (8 AM IST = 2:30 AM UTC) ────────────────────
  post-linkedin:
    name: Post LinkedIn carousel
    runs-on: ubuntu-latest
    needs: generate-and-preview
    timeout-minutes: 15
    if: needs.generate-and-preview.outputs.content_ready == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date }}
          path: ./
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install --quiet requests python-telegram-bot

      - name: Post LinkedIn
        run: cd src && python posters/staggered_poster.py
        env:
          PLATFORM_SLOT: linkedin
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: state.db
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  # ── Job 4: Noon slot (12:30 PM IST = 7 AM UTC) ───────────────────────────
  post-noon:
    name: Post noon slot (Short 2 dry-run)
    runs-on: ubuntu-latest
    needs: generate-and-preview
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date }}
          path: ./
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install --quiet requests python-telegram-bot

      - name: Wait for noon IST then post
        run: |
          # Wait until 7:00 AM UTC = 12:30 PM IST
          TARGET_UTC="07:00"
          while [ "$(date -u +%H:%M)" \< "$TARGET_UTC" ]; do
            echo "Waiting for noon IST... current: $(date -u +%H:%M) UTC"
            sleep 300
          done
          cd src && python posters/staggered_poster.py
        env:
          PLATFORM_SLOT: noon
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: state.db
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  # ── Job 5: Afternoon slot (5:30 PM IST = 12 PM UTC) ──────────────────────
  post-afternoon:
    name: Post afternoon slot (Short 3 code)
    runs-on: ubuntu-latest
    needs: generate-and-preview
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date }}
          path: ./
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install --quiet requests python-telegram-bot

      - name: Wait for 5:30 PM IST then post
        run: |
          TARGET_UTC="12:00"
          while [ "$(date -u +%H:%M)" \< "$TARGET_UTC" ]; do
            echo "Waiting... current: $(date -u +%H:%M) UTC"
            sleep 300
          done
          cd src && python posters/staggered_poster.py
        env:
          PLATFORM_SLOT: afternoon
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: state.db
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  # ── Job 6: Evening slot (9 PM IST = 3:30 PM UTC) ─────────────────────────
  post-evening:
    name: Post evening slot (Short 4 dialogue)
    runs-on: ubuntu-latest
    needs: generate-and-preview
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date }}
          path: ./
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install --quiet requests python-telegram-bot

      - name: Wait for 9 PM IST then post
        run: |
          TARGET_UTC="15:30"
          while [ "$(date -u +%H:%M)" \< "$TARGET_UTC" ]; do
            echo "Waiting... current: $(date -u +%H:%M) UTC"
            sleep 300
          done
          cd src && python posters/staggered_poster.py
        env:
          PLATFORM_SLOT: evening
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: state.db
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

  # ── Job 7: Commit final state ─────────────────────────────────────────────
  commit-state:
    name: Commit final state.db
    runs-on: ubuntu-latest
    needs: [post-morning, post-linkedin, post-noon, post-afternoon, post-evening]
    if: always() && github.event.inputs.dry_run != 'true'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: content-${{ needs.generate-and-preview.outputs.cal_date || 'unknown' }}
          path: ./
          if-no-files-found: ignore
      - name: Commit state.db
        run: |
          git config user.name "dsa-bot"
          git config user.email "dsa-bot@users.noreply.github.com"
          git add state.db
          git diff --cached --quiet || (git commit -m "chore: end-of-day state [skip ci]" && git push)
